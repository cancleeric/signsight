<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>signsight — traffic-sign recognition</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 3rem auto; padding: 0 1rem; }
    h1 { margin-bottom: .25rem; }
    .muted { color: #888; margin-top: 0; }
    .drop { border: 2px dashed #aaa; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; }
    img#preview { max-width: 160px; margin-top: 1rem; border-radius: 8px; display: none; }
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    td, th { text-align: left; padding: .5rem; border-bottom: 1px solid #4444; }
    .bar { height: 8px; background: #4f8cff; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>signsight</h1>
  <p class="muted">Upload a traffic-sign image to get the top predictions.</p>

  <label class="drop" for="file">Click to choose an image
    <input id="file" type="file" accept="image/*" hidden />
  </label>
  <div style="text-align:center"><img id="preview" alt="preview" /></div>

  <table id="results" hidden>
    <thead><tr><th>Sign</th><th>Confidence</th></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    const input = document.getElementById('file');
    const preview = document.getElementById('preview');
    const table = document.getElementById('results');
    const tbody = table.querySelector('tbody');

    input.addEventListener('change', async () => {
      const file = input.files[0];
      if (!file) return;
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'inline-block';

      const body = new FormData();
      body.append('file', file);
      const res = await fetch('/predict?top_k=5', { method: 'POST', body });
      if (!res.ok) { alert('prediction failed'); return; }
      const data = await res.json();

      tbody.innerHTML = '';
      for (const p of data.predictions) {
        const pct = (p.confidence * 100).toFixed(1);
        tbody.insertAdjacentHTML('beforeend',
          `<tr><td>${p.label}</td><td>${pct}%<div class="bar" style="width:${pct}%"></div></td></tr>`);
      }
      table.hidden = false;
    });
  </script>
</body>
</html>
